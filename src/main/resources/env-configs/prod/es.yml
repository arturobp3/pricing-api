spring:
  r2dbc:
    url: r2dbc:h2:mem:///pricingdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  redis:
    host: localhost
    port: 6379
    timeout: 60000

pricing:
  default-currency: EUR
